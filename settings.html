<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0D4F4F">
  <meta name="saans-title-key" content="settings.title">
  <title>Settings</title>
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body data-page="settings" data-shell="app">
  <div class="page-shell">
    <main class="page-main page-main--narrow" id="app-root" style="padding-top:var(--space-8);">
      <h1 data-i18n="settings.title">ترتیبات</h1>
      <div class="ui-card" style="margin-top:var(--space-6);">
        <button type="button" class="ui-btn ui-btn--secondary" id="redoOnboarding" style="width:100%;" data-i18n="settings.redoOnboarding">آن بورڈنگ دوبارہ کریں</button>
      </div>
      <p style="margin-top:var(--space-6);color:var(--color-text-muted);font-size:var(--text-sm);" data-i18n="common.comingSoon">جلد آ رہا ہے</p>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/translations.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/storage.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/onboarding.js"></script>
  <script src="js/header.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/bottom-nav.js"></script>
  <script src="js/chat-bubble.js"></script>
  <script src="js/shell.js"></script>
  <script>
    window.SaansPages = window.SaansPages || {};
    SaansPages.settings = function () {
      requireAuth(function () {
        document.getElementById('redoOnboarding').addEventListener('click', function () {
          window.location.href = saansHref('dashboard.html');
          LS.set('onboardingDone', false);
        });
      });
    };
  </script>
  <script src="js/bootstrap.js"></script>
</body>
</html>
