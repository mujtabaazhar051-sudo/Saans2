<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0D4F4F">
  <meta name="saans-title-key" content="auth.tab.login">
  <title>Login</title>
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/auth.css">
</head>
<body data-page="login" data-shell="auth">

  <div class="page-shell">
    <main class="auth-layout" id="app-root">
      <div class="auth-card">
        <div class="auth-card__top">
          <img class="auth-card__logo" src="assets/logo.svg" alt="" width="56" height="56">
          <p class="auth-card__tagline" data-i18n="auth.tagline">سگریٹ چھوڑیں — زندگی اپنائیں</p>
        </div>

        <p class="firebase-loading" id="firebaseLoading" data-i18n="auth.firebaseLoading">سسٹم لوڈ ہو رہا ہے…</p>

        <div id="loggedInView" style="display:none;">
          <div class="auth-body auth-logged-in">
            <div class="auth-avatar" id="liAvatar">👤</div>
            <h2 id="liName">—</h2>
            <p id="liEmail" class="ui-latin" style="color:var(--color-text-muted);font-size:var(--text-sm);">—</p>
            <div style="margin-top:var(--space-5);display:flex;flex-direction:column;gap:var(--space-3);">
              <a class="ui-btn ui-btn--primary" id="liContinueBtn" href="dashboard.html" data-i18n="auth.continueApp">ڈیش بورڈ پر جائیں</a>
              <button type="button" class="ui-btn ui-btn--secondary" id="liSignoutBtn" data-i18n="auth.signout">لاگ آؤٹ</button>
            </div>
          </div>
        </div>

        <div id="authView">
          <div class="auth-tabs">
            <button type="button" class="auth-tab is-active" id="tabLogin" data-i18n="auth.tab.login">لاگ ان</button>
            <button type="button" class="auth-tab" id="tabSignup" data-i18n="auth.tab.signup">اکاؤنٹ بنائیں</button>
          </div>

          <div class="auth-body">
            <div class="auth-msg" id="authMsg"></div>

            <div class="auth-panel is-active" id="panelLogin">
              <div class="auth-field">
                <label for="loginEmail" data-i18n="auth.email">ای میل</label>
                <input type="email" class="auth-input" id="loginEmail" autocomplete="email" placeholder="you@example.com">
              </div>
              <div class="auth-field">
                <label for="loginPw" data-i18n="auth.password">پاس ورڈ</label>
                <input type="password" class="auth-input" id="loginPw" autocomplete="current-password">
              </div>
              <button type="button" class="auth-btn auth-btn--primary" id="loginBtn">
                <span class="auth-spinner" id="loginSpinner"></span>
                <span data-i18n="auth.loginBtn">لاگ ان کریں</span>
              </button>
              <button type="button" class="auth-link" id="forgotBtn" data-i18n="auth.forgot">پاس ورڈ بھول گئے؟</button>
              <div class="auth-or"><span data-i18n="auth.or">یا</span></div>
              <button type="button" class="auth-btn auth-btn--google" id="googleLoginBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                <span data-i18n="auth.google">Google سے جاری رکھیں</span>
              </button>
            </div>

            <div class="auth-panel" id="panelSignup">
              <div class="auth-field">
                <label for="signupName" data-i18n="auth.name">نام</label>
                <input type="text" class="auth-input" id="signupName" autocomplete="name">
              </div>
              <div class="auth-field">
                <label for="signupEmail" data-i18n="auth.email">ای میل</label>
                <input type="email" class="auth-input" id="signupEmail" autocomplete="email">
              </div>
              <div class="auth-field">
                <label for="signupPw" data-i18n="auth.password">پاس ورڈ</label>
                <input type="password" class="auth-input" id="signupPw" autocomplete="new-password">
              </div>
              <button type="button" class="auth-btn auth-btn--primary" id="signupBtn">
                <span class="auth-spinner" id="signupSpinner"></span>
                <span data-i18n="auth.signupBtn">اکاؤنٹ بنائیں</span>
              </button>
              <div class="auth-or"><span data-i18n="auth.or">یا</span></div>
              <button type="button" class="auth-btn auth-btn--google" id="googleSignupBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                <span data-i18n="auth.google">Google سے جاری رکھیں</span>
              </button>
            </div>
          </div>
        </div>

        <p class="auth-footer-note" data-i18n="auth.footer">لاگ ان کر کے آپ ہماری رازداری پالیسی سے متفق ہیں</p>
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/translations.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/stats.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js?v=4"></script>
  <script src="js/analytics.js?v=4"></script>
  <script src="js/auth.js?v=4"></script>
  <script src="js/header.js?v=4"></script>
  <script src="js/footer.js?v=4"></script>
  <script src="js/bottom-nav.js?v=4"></script>
  <script src="js/chat-bubble.js?v=4"></script>
  <script src="js/shell.js?v=4"></script>
  <script src="js/pages/login.js?v=4"></script>
  <script src="js/bootstrap.js?v=4"></script>
</body>
</html>
