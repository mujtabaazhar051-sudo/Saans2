<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0D4F4F">
  <meta name="saans-title-key" content="savings.title">
  <title>Savings</title>
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/tools.css">
</head>
<body data-page="savings" data-shell="app">
  <div class="page-shell">
    <main class="page-main" id="app-root">
      <div class="tool-page">
        <header class="tool-header">
          <span class="tool-badge">💰 <span data-i18n="tools.savings"></span></span>
          <h1 class="tool-title" data-i18n="savings.title"></h1>
          <p class="tool-subtitle" data-i18n="savings.sub"></p>
        </header>
        <div id="svNoDate" style="display:none;"></div>
        <div id="svMain">
          <div class="tool-hero">
            <div class="tool-hero__label" data-i18n="savings.total"></div>
            <div class="tool-hero__amount">PKR <span id="svTotal">0</span></div>
            <div class="tool-hero__meta"><span id="svUsd"></span></div>
            <div class="tool-hero__meta" style="margin-top:var(--space-4);">
              <div><span class="tool-hero__meta-num" id="svMetaDays">0</span><span data-i18n="tracker.days"></span></div>
              <div><span class="tool-hero__meta-num" id="svMetaCigs">0</span><span data-i18n="savings.cigsAvoided"></span></div>
              <div><span class="tool-hero__meta-num" id="svMetaDaily">0</span><span>PKR/<span data-i18n="savings.period.day"></span></span></div>
            </div>
          </div>
          <div class="ui-card--tool">
            <h2 class="tool-section-title" data-i18n="savings.habits"></h2>
            <div class="tool-form-grid">
              <div class="tool-field"><label data-i18n="savings.cpd"></label><input type="number" id="svCpd" min="1" max="100"></div>
              <div class="tool-field"><label data-i18n="savings.packPrice"></label><input type="number" id="svPp" min="1"></div>
              <div class="tool-field"><label data-i18n="savings.cigsPerPack"></label><input type="number" id="svCpp" min="1"></div>
            </div>
            <button type="button" class="ui-btn ui-btn--primary" id="svRecalc" style="margin-top:var(--space-4);" data-i18n="savings.recalc"></button>
          </div>
          <div class="ui-card--tool">
            <h2 class="tool-section-title" data-i18n="savings.breakdown"></h2>
            <div class="breakdown-grid" id="svBreakdown"></div>
          </div>
          <div class="ui-card--tool ui-card--tool-accent" style="text-align:center;">
            <div style="font-size:2rem;">🚬</div>
            <div style="font-size:var(--text-2xl);font-weight:700;color:var(--color-primary);" id="svCigsBanner">0</div>
            <div data-i18n="savings.cigsAvoided"></div>
          </div>
          <div class="ui-card--tool">
            <h2 class="tool-section-title" data-i18n="savings.buysTitle"></h2>
            <div class="buy-grid" id="svBuys"></div>
          </div>
          <div class="tool-share">
            <div><div class="tool-share__title" data-i18n="savings.shareTitle"></div><div class="tool-share__sub" data-i18n="savings.shareSub"></div></div>
            <button type="button" class="ui-btn" id="svShareBtn" data-i18n="savings.shareBtn"></button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="js/config.js"></script>
  <script src="js/translations.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/share.js"></script>
  <script src="js/data/content.js"></script>
  <script src="js/pages/tools-common.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js?v=5"></script>
  <script src="js/analytics.js?v=5"></script>
  <script src="js/auth.js?v=5"></script>
  <script src="js/header.js?v=5"></script>
  <script src="js/footer.js?v=5"></script>
  <script src="js/bottom-nav.js?v=5"></script>
  <script src="js/chat-bubble.js?v=5"></script>
  <script src="js/shell.js?v=5"></script>
  <script src="js/pages/savings.js?v=5"></script>
  <script src="js/bootstrap.js?v=5"></script>
</body>
</html>
