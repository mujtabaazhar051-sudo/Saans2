<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0D4F4F">
  <meta name="saans-title-key" content="health.title">
  <title>Health</title>
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/tools.css">
</head>
<body data-page="health" data-shell="app">
  <div class="page-shell">
    <main class="page-main" id="app-root">
      <div class="tool-page">
        <header class="tool-header">
          <span class="tool-badge">❤️ <span data-i18n="tools.health"></span></span>
          <h1 class="tool-title" data-i18n="health.title"></h1>
          <p class="tool-subtitle" data-i18n="health.sub"></p>
        </header>
        <div id="hlNoDate" style="display:none;"></div>
        <div id="hlMain">
          <div class="tool-stats" style="grid-template-columns:1fr;">
            <div class="tool-stat"><span class="tool-stat__icon">📅</span><span class="tool-stat__num" id="hlDays">0</span><span class="tool-stat__label" data-i18n="health.daysLabel"></span></div>
          </div>
          <div class="ui-card--tool ui-card--tool-accent" id="hlLatest">
            <div style="font-size:var(--text-xs);color:var(--color-primary);font-weight:600;" data-i18n="health.latest"></div>
            <div style="display:flex;gap:var(--space-4);align-items:center;margin-top:var(--space-3);">
              <span id="hlLatestIcon" style="font-size:2rem;"></span>
              <div><div style="font-weight:700;" id="hlLatestTitle"></div><div style="font-size:var(--text-sm);color:var(--color-text-muted);" id="hlLatestDesc"></div></div>
            </div>
          </div>
          <div class="ui-card--tool">
            <h2 class="tool-section-title" data-i18n="health.progress"></h2>
            <div class="metric-bar"><div class="metric-bar__fill" id="hlProgressBar" style="width:0;"></div></div>
            <div style="text-align:end;font-size:var(--text-sm);margin-top:4px;" id="hlProgressPct">0%</div>
          </div>
          <div class="ui-card--tool">
            <h2 class="tool-section-title" data-i18n="health.timeline"></h2>
            <div class="timeline" id="hlTimeline"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="js/config.js"></script>
  <script src="js/translations.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/theme.js?v=12"></script>
  <script src="js/stats.js"></script>
  <script src="js/data/content.js"></script>
  <script src="js/pages/tools-common.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js?v=12"></script>
  <script src="js/analytics.js?v=12"></script>
  <script src="js/auth.js?v=12"></script>
  <script src="js/header.js?v=12"></script>
  <script src="js/footer.js?v=12"></script>
  <script src="js/bottom-nav.js?v=12"></script>
  <script src="js/chat-bubble.js?v=12"></script>
  <script src="js/shell.js?v=12"></script>
  <script src="js/pages/health.js?v=12"></script>
  <script src="js/bootstrap.js?v=12"></script>
</body>
</html>
