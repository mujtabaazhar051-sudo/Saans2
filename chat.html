<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0D4F4F">
  <meta name="saans-title-key" content="chat.title">
  <title>Coach</title>
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/chat.css">
</head>
<body data-page="chat" data-shell="app">
  <div class="page-shell">
    <div class="chat-page" id="app-root">
      <div class="chat-subbar">
        <div class="chat-subbar__avatar">🤖</div>
        <div class="chat-subbar__info">
          <div class="chat-subbar__name" data-i18n="chat.coachName"></div>
          <div class="chat-subbar__status">
            <span class="chat-subbar__dot"></span>
            <span data-i18n="chat.online"></span>
          </div>
        </div>
        <button type="button" class="ui-btn ui-btn--ghost" id="chatClearBtn" title="Clear">🗑</button>
        <a class="ui-btn ui-btn--ghost" href="settings.html" id="chatSettingsLink" title="Settings">⚙️</a>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="chat-welcome">
          <span class="chat-welcome__icon">🤖</span>
          <div class="chat-welcome__title" data-i18n="chat.welcomeTitle"></div>
          <div class="chat-welcome__sub" data-i18n="chat.welcomeSub"></div>
        </div>
        <div class="chat-api-notice" id="chatApiNotice">
          <span data-i18n="chat.apiNotice"></span>
          <a href="settings.html" id="chatApiLink" data-i18n="chat.apiNoticeLink"></a>
        </div>
        <div class="chat-suggestions" id="chatSuggestions"></div>
      </div>

      <div class="chat-input-wrap">
        <textarea class="chat-input" id="chatInput" rows="1" placeholder=""></textarea>
        <button type="button" class="chat-send" id="chatSendBtn" aria-label="Send">➤</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/translations.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/coach.js?v=8"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-functions-compat.js"></script>
  <script src="js/firebase.js?v=8"></script>
  <script src="js/auth.js?v=8"></script>
  <script src="js/header.js?v=8"></script>
  <script src="js/footer.js?v=8"></script>
  <script src="js/bottom-nav.js?v=8"></script>
  <script src="js/chat-bubble.js?v=8"></script>
  <script src="js/shell.js?v=8"></script>
  <script src="js/pages/chat.js?v=8"></script>
  <script src="js/bootstrap.js?v=8"></script>
</body>
</html>
