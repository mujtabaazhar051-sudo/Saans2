<!DOCTYPE html>
<html lang="ur" dir="rtl">
<!--
  SAANS — PAGE TEMPLATE
  Copy this file when adding a new page. Do not copy-paste nav/footer HTML.

  1. Set data-shell:  public | auth | app
  2. Set data-page:    unique page id (optional hook for js/pages/*.js)
  3. Add page content inside #app-root only
  4. Keep script order identical
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <meta name="theme-color" content="#0D4F4F">
  <meta name="saans-title-key" content="site.name">
  <title>سانس</title>

  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <!-- Optional: <link rel="stylesheet" href="css/pages/your-page.css"> -->
</head>
<body data-page="example" data-shell="public">

  <div class="page-shell">
    <main class="page-main" id="app-root">
      <!-- Page-only content here -->
      <h1 data-i18n="site.name"></h1>
    </main>

    <!-- Footer mount point (public shell only — shell.js also appends if needed) -->
    <div id="saans-footer-mount"></div>
  </div>

  <!-- ═══ SCRIPTS — DO NOT REORDER ═══ -->
  <script src="js/config.js"></script>
  <script src="js/translations.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/storage.js"></script>
  <!-- Phase 2+: <script src="js/firebase.js"></script> -->
  <!-- Phase 2+: <script src="js/auth.js"></script> -->
  <script src="js/header.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/bottom-nav.js"></script>
  <script src="js/chat-bubble.js"></script>
  <script src="js/shell.js"></script>
  <!-- Optional page script: <script src="js/pages/example.js"></script> -->
  <script src="js/bootstrap.js"></script>
</body>
</html>
