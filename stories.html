<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0D4F4F">
  <meta name="saans-title-key" content="stories.title">
  <title>Stories</title>
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/tools.css">
</head>
<body data-page="stories" data-shell="app">
  <div class="page-shell">
    <main class="page-main" id="app-root">
      <div class="tool-page">
        <header class="tool-header">
          <span class="tool-badge">⭐ <span data-i18n="tools.stories"></span></span>
          <h1 class="tool-title" data-i18n="stories.title"></h1>
          <p class="tool-subtitle" data-i18n="stories.sub"></p>
        </header>
        <div id="stList"></div>
        <div class="ui-card--tool" style="margin-top:var(--space-6);">
          <h2 class="tool-section-title" data-i18n="stories.submitTitle"></h2>
          <div class="tool-form-grid">
            <div class="tool-field"><input type="text" id="stName" data-i18n-placeholder="stories.namePh" placeholder=""></div>
            <div class="tool-field"><input type="number" id="stDays" data-i18n-placeholder="stories.daysPh" placeholder=""></div>
          </div>
          <div class="tool-field" style="margin-top:var(--space-3);"><textarea id="stText" rows="4" style="width:100%;padding:10px;border:1px solid var(--color-border);border-radius:var(--radius-md);font-family:inherit;" data-i18n-placeholder="stories.textPh" placeholder=""></textarea></div>
          <button type="button" class="ui-btn ui-btn--primary" id="stSubmit" style="margin-top:var(--space-4);" data-i18n="stories.submit"></button>
        </div>
      </div>
    </main>
  </div>
  <script src="js/config.js"></script>
  <script src="js/translations.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/data/content.js"></script>
  <script src="js/pages/tools-common.js"></script>
  <script src="js/header.js?v=5"></script>
  <script src="js/footer.js?v=5"></script>
  <script src="js/bottom-nav.js?v=5"></script>
  <script src="js/chat-bubble.js?v=5"></script>
  <script src="js/shell.js?v=5"></script>
  <script src="js/pages/stories.js?v=5"></script>
  <script src="js/bootstrap.js?v=5"></script>
</body>
</html>
